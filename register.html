<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar - APPÉA 🍎</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        /* CSS yang sama dengan login untuk konsistensi */
        :root {
            --bg: #FDF6F0;
            --sidebar-bg: linear-gradient(160deg, #F9ECF0 0%, #EFE6F7 50%, #E5F5ED 100%);
            --primary: #C45E73;
            --white: #ffffff;
            --text-light: #A08CA2;
            --shadow: 0 4px 24px rgba(180,120,150,0.12);
        }
        body { font-family: 'DM Sans', sans-serif; background: var(--sidebar-bg); margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .auth-card { background: var(--white); padding: 35px; border-radius: 20px; width: 100%; max-width: 400px; box-shadow: var(--shadow); text-align: center; }
        .logo { font-size: 26px; font-weight: 700; color: var(--primary); margin-bottom: 20px; }
        .form-group { text-align: left; margin-bottom: 12px; }
        label { font-size: 11px; font-weight: 500; display: block; margin-bottom: 4px; color: var(--text-light); text-transform: uppercase; }
        input, textarea { width: 100%; padding: 11px; border: 1px solid rgba(213,165,185,0.35); border-radius: 10px; box-sizing: border-box; font-family: inherit; }
        .btn-primary { width: 100%; padding: 13px; background: var(--primary); color: white; border: none; border-radius: 30px; font-weight: 600; cursor: pointer; margin-top: 15px; }
        .footer-link { font-size: 13px; margin-top: 15px; color: var(--text-light); }
        .footer-link a { color: var(--primary); text-decoration: none; font-weight: 600; }
        .success-message {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 13px;
            display: none;
        }
        .success-message.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="auth-card">
        <div class="logo">Gabung APPÉA 🍎</div>
        <div class="success-message" id="successMsg"></div>
        <form onsubmit="event.preventDefault(); handleRegister();">
            <div class="form-group"><label>Nama Lengkap</label><input type="text" id="regName" required></div>
            <div class="form-group"><label>Email</label><input type="email" id="regEmail" required></div>
            <div class="form-group"><label>Nomor Telepon</label><input type="tel" required></div>
            <div class="form-group"><label>Alamat Lengkap</label><textarea rows="2" required></textarea></div>
            <div class="form-group"><label>Password</label><input type="password" id="regPassword" required></div>
            <button type="submit" class="btn-primary">Buat Akun</button>
        </form>
        <div class="footer-link">Sudah punya akun? <a href="login.html">Login</a></div>
    </div>
    <script>
        function handleRegister() {
            const email = document.getElementById('regEmail').value.trim().toLowerCase();
            const password = document.getElementById('regPassword').value;
            const successMsg = document.getElementById('successMsg');
            const existingUsers = JSON.parse(localStorage.getItem('appeaUsers')) || [];
            if (existingUsers.find(u => u.email === email)) {
                successMsg.textContent = 'Email sudah terdaftar. Gunakan email lain atau login.';
                successMsg.style.background = '#f8d7da';
                successMsg.style.color = '#721c24';
                successMsg.classList.add('show');
                return;
            }
            const newUser = { email: email, password: password, role: 'customer' };
            existingUsers.push(newUser);
            localStorage.setItem('appeaUsers', JSON.stringify(existingUsers));
            successMsg.textContent = 'Akun berhasil dibuat! Redirecting ke halaman login...';
            successMsg.style.background = '#d4edda';
            successMsg.style.color = '#155724';
            successMsg.classList.add('show');
            setTimeout(() => { window.location.href = 'login.html'; }, 2000);
        }
    </script>
</body>
</html>
