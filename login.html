<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - APPÉA 🍎</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #FDF6F0;
            --sidebar-bg: linear-gradient(160deg, #F9ECF0 0%, #EFE6F7 50%, #E5F5ED 100%);
            --primary: #C45E73;
            --text: #2D1B2E;
            --text-light: #A08CA2;
            --white: #ffffff;
            --shadow: 0 4px 24px rgba(180,120,150,0.12);
        }
        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--sidebar-bg);
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .auth-card {
            background: var(--white);
            padding: 40px;
            border-radius: 20px;
            width: 100%;
            max-width: 360px;
            box-shadow: var(--shadow);
            text-align: center;
        }
        .logo { font-size: 28px; font-weight: 700; color: var(--primary); margin-bottom: 8px; }
        .tagline { font-size: 13px; color: var(--text-light); margin-bottom: 25px; }
        .form-group { text-align: left; margin-bottom: 15px; }
        label { font-size: 12px; font-weight: 500; display: block; margin-bottom: 5px; color: var(--text-light); }
        input {
            width: 100%; padding: 12px; border: 1px solid rgba(213,165,185,0.35);
            border-radius: 12px; box-sizing: border-box; outline: none;
        }
        input:focus { border-color: var(--primary); }
        .btn-primary {
            width: 100%; padding: 13px; background: var(--primary); color: white;
            border: none; border-radius: 30px; font-weight: 600; cursor: pointer; margin-top: 10px;
        }
        .footer-link { font-size: 13px; margin-top: 20px; color: var(--text-light); }
        .footer-link a { color: var(--primary); text-decoration: none; font-weight: 600; }
        .error-message {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 13px;
            display: none;
        }
        .error-message.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="auth-card">
        <div class="logo">APPÉA 🍎</div>
        <div class="tagline">Glow with nature's touch.</div>
        <div class="error-message" id="errorMsg"></div>
        <form onsubmit="event.preventDefault(); handleLogin();">
            <div class="form-group">
                <label>Email / Username</label>
                                <input type="text" id="loginUser" placeholder="fill this field" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                                <input type="password" id="loginPass" placeholder="fill this field" required>
            </div>
            <button type="submit" class="btn-primary">Masuk Sekarang</button>
        </form>
        <div class="footer-link">Belum punya akun? <a href="register.html">Daftar</a></div>
    </div>
        <script>
            // Default registered users (customers)
            const defaultUsers = [
                { email: 'customer@appea.id', password: 'customer123', role: 'customer' },
                { email: 'user@gmail.com', password: 'password123', role: 'customer' }
            ];

            function handleLogin() {
                const user = document.getElementById('loginUser').value.trim().toLowerCase();
                const pass = document.getElementById('loginPass').value;
                const errorMsg = document.getElementById('errorMsg');

                // Clear previous error message
                errorMsg.classList.remove('show');
                errorMsg.textContent = '';

                // Check admin credentials
                if ((user === 'admin@appea.id' || user === 'admin') && pass === 'admin123') {
                    localStorage.setItem('appeaLoggedIn', '1');
                    localStorage.setItem('appeaRole', 'admin');
                    window.location.href = 'admin.html';
                    return;
                }

                // Check customer credentials
                const registeredUsers = JSON.parse(localStorage.getItem('appeaUsers')) || defaultUsers;
                const foundUser = registeredUsers.find(u => u.email === user && u.password === pass);

                if (foundUser) {
                    localStorage.setItem('appeaLoggedIn', '1');
                    localStorage.setItem('appeaRole', 'customer');
                    window.location.href = 'dashboard.html';
                    return;
                }

                // Show error message
                errorMsg.textContent = 'Email/Username atau password salah. Silakan coba lagi.';
                errorMsg.classList.add('show');
            }
        </script>
</body>
</html>
